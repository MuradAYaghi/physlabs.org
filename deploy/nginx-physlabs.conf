server {
    listen 80;
    listen [::]:80;
    server_name physlabs.org www.physlabs.org;

    root /var/www/physlabs.org/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
